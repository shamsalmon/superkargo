metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: custompromotionsteps.plugin.kargo.akuity.io
spec:
  group: plugin.kargo.akuity.io
  names:
    kind: CustomPromotionStep
    listKind: CustomPromotionStepList
    plural: custompromotionsteps
    shortNames:
    - cps
    singular: custompromotionstep
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.plugin
      name: Plugin
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: CustomPromotionStep binds a promotion step name to a go-plugin
          RPC plugin.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec binds the step to a plugin.
            properties:
              defaultErrorThreshold:
                description: |-
                  DefaultErrorThreshold is the number of consecutive failures tolerated
                  before the Promotion is failed. It can be overridden by step-level
                  configuration.
                format: int32
                type: integer
              defaultTimeout:
                description: |-
                  DefaultTimeout is the default soft maximum interval for which the step may
                  remain Running. It can be overridden by step-level configuration.
                type: string
              plugin:
                description: |-
                  Plugin is the name of the go-plugin executable to invoke. The controller
                  resolves it within its configured plugin directory. Defaults to the
                  resource's own name when omitted.
                type: string
              sharePromotionFolder:
                description: |-
                  SharePromotionFolder, when true, passes the promotion's working directory
                  to the plugin so it can read and write the same files as built-in steps
                  (e.g. a git checkout). Because the plugin runs as a subprocess on the
                  controller host, it shares the controller's filesystem.
                type: boolean
            type: object
          status:
            description: Status describes the observed state of the CustomPromotionStep.
            properties:
              conditions:
                description: Conditions describe the current state of the CustomPromotionStep.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
