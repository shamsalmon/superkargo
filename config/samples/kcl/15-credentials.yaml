# Git credentials so the controller can clone (if private) and push. Replace the
# repoURL/username and provide a token (a fine-grained PAT or deploy key is
# recommended over a personal OAuth token). The kargo.akuity.io/cred-type=git
# label is what makes Kargo treat this Secret as Git credentials.
apiVersion: v1
kind: Secret
metadata:
  name: kcl-demo-repo
  namespace: kcl-demo
  labels:
    kargo.akuity.io/cred-type: git
stringData:
  repoURL: https://github.com/your-org/kargo-kcl-demo.git
  username: your-username
  password: REPLACE_WITH_TOKEN
